name: probe

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mtr-tiny

      - name: run probe
        env:
          TARGET: ${{ secrets.HOME_IP }}
        run: |
          mkdir -p logs
          day=$(date -u +%Y-%m-%d)
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          file="logs/$day.log"

          {
            echo "---- $ts ----"
            echo "[runner] $(curl -s ifconfig.me || echo unknown)"
            echo "[ping]"
            ping -c 20 -W 2 "$TARGET" || echo "PING_FAILED"
            echo "[mtr]"
            sudo mtr -rwzc 10 "$TARGET" || echo "MTR_FAILED"
          } >> "$file"

      - name: commit
        run: |
          git config user.name probe
          git config user.email probe@local
          git add logs/
          git diff --cached --quiet && exit 0
          git commit -m "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
